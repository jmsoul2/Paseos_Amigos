name: Deploy a GitHub Pages

# Publica el contenido de src/ en GitHub Pages en cada push a main.
# (El sitio es 100% estático; el backend es Supabase, no hace falta build.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos pisándose.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Activa Pages en modo "GitHub Actions" automáticamente si no lo estaba.
          enablement: true
      - name: Subir artefacto (carpeta src/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src
      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
